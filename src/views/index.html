<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Generar PDF</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://framework-gb.cdn.gob.mx/gm/v3/assets/styles/main.css" rel="stylesheet">
  <link href="https://framework-gb.cdn.gob.mx/gm/v3/assets/images/favicon.ico" rel="shortcut icon">
</head>

<body>
  <main class="page">
    <div class="container">
      <!-- coloca este bloque si falta en tu HTML -->
      <section class="form-wrapper">
        <!-- BARRA DE SESIÓN -->
        <div id="session-info">
          <span id="userNameDisplay">Cargando...</span>
          <button id="btnLogout" type="button">
            Cerrar Sesión
          </button>
        </div>

        <div class="header-main">
          <h1 class="title-centered">Generar Formato ABC</h1>
          <div id="fecha-container" class="date-display-big"></div>
          <button id="btnLoadDraft" type="button">
            <span style="font-size:1.2rem;">📂</span> 
            <span>Cargar Historial</span>
          </button>
        </div>
        
        <dialog id="draftsModal">
            <div class="modal-header">
                <h3>Historial de Archivos</h3>
                <span id="btnCloseDraftsX" style="cursor:pointer;font-size:1.5rem;line-height:1;">&times;</span>
            </div>
            
            <div style="padding: 15px 20px; background: #f5f5f5; border-bottom: 1px solid #ddd;">
                <input type="text" id="searchReporte" placeholder="🔍 Buscar por Reporte Mesa de Servicio..." 
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <div style="margin-top:10px; display:flex; align-items:center;">
                    <input type="checkbox" id="chkShowPending" style="width:auto; margin-right:8px; cursor:pointer;">
                    <label for="chkShowPending" style="cursor:pointer; font-size:0.9em; user-select:none;">Ver solo pendientes de Reporte</label>
                </div>
            </div>

            <ul id="draftsList"></ul>
            <div class="modal-footer">
                <button id="btnCloseDrafts" type="button">Cerrar</button>
            </div>
        </dialog>

        <label for="templateSelect">Plantilla</label>
        <select id="templateSelect">
          <option value="">Cargando…</option>
        </select>

        <div id="fieldsContainer"></div>

        <button id="btnGenerar" disabled>Generar PDF</button>
        <div id="msg"></div>
      </section>

      <!-- MODAL DE REPORTE FALTANTE -->
      <dialog id="modalMissingReport" style="padding:0; border:none; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.3); max-width:400px; width:90%;">
        <div style="background:#611232; color:white; padding:15px; font-weight:bold; font-size:1.1em; display:flex; justify-content:space-between; align-items:center;">
             <span>⚠️ Falta Número de Reporte</span>
             <span id="closeMissingX" style="cursor:pointer; font-size:1.5em; line-height:1;">&times;</span>
        </div>
        <div style="padding:20px; text-align:center;">
            <p style="margin-bottom:20px; color:#555; font-size:1em; line-height:1.5;">
                No ha ingresado un número de reporte de mesa de servicios.<br>
                <strong>¿Deseas solicitarlo por correo?</strong>
            </p>
            
            <button id="btnSolicitarReporte" style="display:block; width:100%; margin-bottom:10px; background-color:#1e88e5; color:white; border:none; padding:12px; border-radius:4px; cursor:pointer; font-weight:bold;">
                 Solicitar
            </button>
            <!-- <button id="btnGenerarPendiente" style="display:block; width:100%; margin-bottom:10px; background-color:#fb8c00; color:white; border:none; padding:12px; border-radius:4px; cursor:pointer; font-weight:bold;">
                📄 Solo Generar PDF (Pendiente)
            </button> -->
            <!-- <button id="btnCancelarReporte" style="display:block; width:100%; background-color:#eee; color:#333; border:1px solid #ddd; padding:10px; border-radius:4px; cursor:pointer;">
                Cancelar
            </button> -->
        </div>
      </dialog>

      <!-- Formulario dinámico para plantillas -->

    </div>
  </main>

  <!-- Scripts -->
  <script src="https://framework-gb.cdn.gob.mx/gm/v3/assets/js/gobmx.js"></script>

  <!-- Papa Parse para leer CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script src="js/app.js"></script>
  <!-- Snackbar (superpuesto tipo MUI) -->
  <div id="snackbar" class="snackbar" role="status" aria-live="polite" aria-atomic="true"></div>
</body>

</html>

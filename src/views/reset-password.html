<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Conagua - Restablecer Contraseña</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Estilos base (heredados de login.html) */
    body {
      margin: 0; 
      padding: 0;
      width: 100vw; 
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background-color: #eee;
    }
    
    .container {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .top {
      position: absolute;
      width: 100%;
      height: 50%;
      background-color: #eee;
      top: 0;
      transition: all 0.5s;
      z-index: 10;
    }
    
    .bottom {
      position: absolute;
      width: 100%;
      height: 50%;
      background-color: #eee;
      bottom: 0;
      transition: all 0.5s;
      z-index: 10;
    }
    
    .center {
      position: absolute;
      width: 400px;
      height: 400px;
      top: 50%;
      left: 50%;
      margin-left: -200px;
      margin-top: -200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
      opacity: 0;
      transition: all 0.5s;
      background: rgba(255,255,255,0.9);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .container.active-state .center {
        opacity: 1;
        transition-delay: 0.2s;
    }

    .logo {
        max-width: 250px;
        margin-bottom: 20px;
    }

    form {
        display: flex;
        flex-direction: column;
        width: 100%;
        align-items: center;
    }
    
    input {
        margin: 10px 0;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1em;
        width: 80%;
    }
    
    button {
        margin-top: 20px;
        padding: 12px;
        background-color: #1b365d;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 1.1em;
        border-radius: 4px;
        width: 85%;
    }
    
    button:hover {
        background-color: #407ec9;
    }

    #message {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
        width: 100%;
    }
  </style>
</head>
<body>

  <div class="container active-state" id="mainContainer">
    <div class="top"></div>
    <div class="bottom"></div>
    
    <div class="center">
        <img src="img/Logo_nuevo_CONAGUA.png" alt="Conagua" class="logo">
        <h2 style="color: #333; margin-bottom: 20px;">Nueva Contraseña</h2>
        
        <form id="resetForm">
            <input type="password" id="password" placeholder="Nueva Contraseña" required>
            <input type="password" id="confirm" placeholder="Confirmar Contraseña" required>
            <button type="submit">ACTUALIZAR</button>
        </form>
        
        <div id="message"></div>
        <a href="/login" id="loginLink" style="display:none; margin-top:15px; color:#1b365d; text-decoration:none; font-weight:bold;">Ir al Inicio de Sesión</a>
    </div>
  </div>

<script>
    // Obtener token de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    const form = document.getElementById('resetForm');
    const msgDiv = document.getElementById('message');
    const loginLink = document.getElementById('loginLink');

    if (!token) {
        form.style.display = 'none';
        msgDiv.textContent = 'Enlace inválido. Falta el token de seguridad.';
        msgDiv.style.color = 'red';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('confirm').value;

        if (p1 !== p2) {
            msgDiv.textContent = 'Las contraseñas no coinciden';
            msgDiv.style.color = 'red';
            return;
        }

        try {
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword: p1 })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                msgDiv.innerHTML = '¡Contraseña actualizada correctamente!<br>Redirigiendo...';
                msgDiv.style.color = 'green';
                form.style.display = 'none';
                loginLink.style.display = 'block';
                setTimeout(() => window.location.href = '/login', 2500);
            } else {
                msgDiv.textContent = data.message || 'Error al actualizar';
                msgDiv.style.color = 'red';
            }
        } catch (err) {
            msgDiv.textContent = 'Error de conexión con el servidor';
            msgDiv.style.color = 'red';
        }
    });
</script>

</body>
</html>

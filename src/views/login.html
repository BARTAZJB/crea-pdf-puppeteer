<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <style>
    @import url('https://fonts.googleapis.com/css?family=Raleway:400,700');

    *, *:before, *:after {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Raleway', sans-serif;
      margin: 0;
      overflow: hidden; /* Prevent scrollbars from absolute positioning */
    }

    .container {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer; /* Suggest interaction */
    }

    /* Top and Bottom Sections */
    .top:before, .top:after, 
    .bottom:before, .bottom:after {
      content: '';
      display: block;
      position: absolute;
      width: 200vmax;
      height: 200vmax;
      top: 50%;
      left: 50%;
      margin-top: -100vmax;
      transform-origin: 0 50%;
      transition: all 0.5s cubic-bezier(0.445, 0.05, 0, 1);
      z-index: 10;
      opacity: 0.65;
      transition-delay: 0.2s; 
    }

    /* Top Specifics */
    .top:before {
      transform: rotate(45deg);
      background: #407ec9; /* Pantone 660 C */
    }
    .top:after {
      transform: rotate(135deg);
      background: #a6802d; /* Pantone 1255 C */
    }

    /* Bottom Specifics */
    .bottom:before {
      transform: rotate(-45deg);
      background: #707372; /* Pantone 424 C */
    }
    .bottom:after {
      transform: rotate(-135deg);
      background: #1b365d; /* Pantone 534 C */
    }

    /* Center Form */
    .center {
      position: absolute;
      width: 400px;
      height: 400px;
      top: 50%;
      left: 50%;
      margin-left: -200px;
      margin-top: -200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.445, 0.05, 0, 1);
      transition-delay: 0s;
      color: #333;
      z-index: 20; /* Ensure form is above generic divs once visible */
      pointer-events: none; /* Initially non-interactive */
    }

    .center input {
      width: 100%;
      padding: 15px;
      margin: 5px;
      border-radius: 1px;
      border: 1px solid #ccc;
      font-family: inherit;
    }

    /* Hover & Active States (Revealing the form) */
    .container:hover .top:before, .container:active .top:before,
    .container:hover .top:after, .container:active .top:after,
    .container:hover .bottom:before, .container:active .bottom:before,
    .container:hover .bottom:after, .container:active .bottom:after,
    .container.active-state .top:before, .container.active-state .top:after,
    .container.active-state .bottom:before, .container.active-state .bottom:after {
      margin-left: 200px;
      transform-origin: -200px 50%;
      transition-delay: 0s;
    }

    .container:hover .center, 
    .container:active .center,
    .container.active-state .center {
      opacity: 1;
      transition-delay: 0.2s;
      pointer-events: auto; /* Make interactive when visible */
    }

    /* Button Styling (adapted from h2 &nbsp;) */
    .btn-login {
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #1b365d; /* Pantone 534 C */
        color: white;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 1.2em;
        transition: background 0.3s;
    }
    .btn-login:hover {
        background-color: #407ec9; /* Pantone 660 C */
    }

    #error-message {
        color: red;
        margin-top: 10px;
        font-weight: bold;
        display: none;
    }

  </style>
</head>
<body>

  <div class="container" id="loginContainer">
    <div class="top"></div>
    <div class="bottom"></div>
    <div class="center">
      <h2>Iniciar Sesión</h2>
      <form id="loginForm">
        <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" name="password" placeholder="Contraseña" required>
        <button type="submit" class="btn-login">ENTRAR</button>
      </form>
      <div id="error-message"></div>
    </div>
  </div>

  <script>
    // Keep the "open" state if the user clicks or focuses, so they can type
    const container = document.getElementById('loginContainer');
    const inputs = document.querySelectorAll('input');

    // If user clicks inside inputs, keep container "active"
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        container.classList.add('active-state');
      });
      input.addEventListener('blur', () => {
        // Only remove if we aren't focusing another input
        setTimeout(() => {
            if (!document.activeElement || (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'BUTTON')) {
                container.classList.remove('active-state');
            }
        }, 100); 
      });
    });
    
    // Also toggle on click for mobile/touch
    container.addEventListener('click', (e) => {
        // If clicking the background, toggle? 
        // Better: just add active state
        container.classList.add('active-state');
    });

    // Handle Login Logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                window.location.href = '/'; // Redirect to main page
            } else {
                const data = await response.json();
                errorDiv.textContent = data.message || 'Error al iniciar sesión';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            console.error(error);
            errorDiv.textContent = 'Error de conexión';
            errorDiv.style.display = 'block';
        }
    });
  </script>

</body>
</html>
